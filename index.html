<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Main stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" id="app-container">
        
        <!-- App title -->
        <h2>Password Generator</h2>

        <!-- Theme toggle button -->
        <button id="theme-toggle" class="reset-btn" style="position:absolute; top:20px; right:20px; padding:8px;">
            🌙
        </button>
        
        <!-- Input section -->
        <div class="inputs-wrapper">
            <div class="input-group">
                <label>Total Length</label>
                <input type="number" id="length" value="12" min="4" max="50" class="num-input">
            </div>
            <div class="input-group">
                <label>Uppercase</label>
                <input type="number" id="upper" value="3" min="0" class="num-input">
            </div>
            <div class="input-group">
                <label>Lowercase</label>
                <input type="number" id="lower" value="4" min="0" class="num-input">
            </div>
            <div class="input-group">
                <label>Special Characters</label>
                <input type="number" id="special" value="2" min="0" class="num-input">
            </div>
            <div class="input-group">
                <label>Digits</label>
                <input type="number" id="digits" value="3" min="0" class="num-input">
            </div>
        </div>

        <!-- Action buttons -->
        <div class="action-buttons">
            <button type="button" onclick="generate()" class="generate-btn">
                <span>Generate Password</span>
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M5 12h14"></path>
                    <path d="m12 5 7 7-7 7"></path>
                </svg>
            </button>

            <button type="button" onclick="resetApp()" class="reset-btn" title="Reset all settings">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
                    <path d="M3 3v5h5"></path>
                </svg>
            </button>
        </div>
        
        <!-- Error message (fallback, not primary UI) -->
        <p id="error-msg" class="error"></p>
        
        <!-- Generated password display -->
        <div class="result-box">
            <div class="result" id="result">Your_Password</div>
            <button type="button" class="copy-btn" onclick="copyToClipboard()" title="Copy to clipboard">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                </svg>
            </button>
        </div>

        <!-- Strength indicator -->
        <div class="strength-wrapper">
            <div class="strength-header">
                <span>Security Level</span>
                <span id="strength-text">None</span>
            </div>
            <div class="strength-meter">
                <div class="strength-bar" id="strength-bar"></div>
            </div>
        </div>

        <!-- Suggested passwords -->
        <div class="history-wrapper">
            <p class="history-title">Suggested Passwords</p>
            <div class="history-container" id="suggestions-container"></div>
        </div>
    </div>

    <!-- Toast notification -->
    <div id="toast" class="toast">Action Successful!</div>

    <!-- Main script -->
    <script src="script.js"></script>
</body>
</html>
